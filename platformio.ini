; PlatformIO Project Configuration
; ESP32-S3-Touch-AMOLED-1.75C  (Waveshare)
; CO5300 466x466 QSPI AMOLED – analogue clock (LVGL)

; ─── Common ──────────────────────────────────────────────────────────────────
[common]
lib_deps_lvgl = lvgl/lvgl@^8.4.0

; ─── Hardware target ─────────────────────────────────────────────────────────
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 16 MB flash (QIO, 80 MHz) – matches the Waveshare board
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB

; Use native USB for serial output
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DESP32QSPI_FREQUENCY=80000000
    -I include

; PSRAM
board_build.arduino.memory_type = qio_opi

monitor_speed = 115200

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.3.1
    h2zero/NimBLE-Arduino@^1.4.1
    lewisxhe/XPowersLib@^0.3.3
    ${common.lib_deps_lvgl}

; Exclude the SDL simulator main from the hardware build
build_src_filter = +<*> -<sim_main.cpp> -<sim_gadgetbridge.cpp> -<sim_sound.cpp>

; ─── Native SDL Simulator ────────────────────────────────────────────────────
[env:simulator]
platform = native
build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -DSIMULATOR=1
    -IC:/msys64/mingw64/include/SDL2
    -LC:/msys64/mingw64/lib
    -lmingw32
    -lSDL2main
    -lSDL2
    -lws2_32

lib_deps =
    ${common.lib_deps_lvgl}

; Only compile the simulator main + clock_face + sim gadgetbridge + screens (no Arduino/ESP code)
build_src_filter = +<clock_face.c> +<sim_main.cpp> +<sim_gadgetbridge.cpp> +<sim_sound.cpp> +<screen_manager.c> +<stopwatch.c> +<timer_screen.c> +<alarm_screen.c> +<seg7.c> +<weather_screen.c> +<lv_font_weather.c> +<radar_screen.c> +<compass_screen.c> +<media_screen.c> +<level_screen.c> +<sysinfo_screen.c> +<nav_screen.c> +<lv_font_nav.c>

; Ensure SDL2.dll is on PATH when running the simulator
extra_scripts = add_sdl2_path.py
